<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>miBooks</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f6f1e8;
      --card: #ffffff;
      --text: #222222;
      --muted: #666666;
      --line: #d7ccbc;
      --accent: #345c4a;
    }

    body {
      font-family: Georgia, serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 2.5rem 1rem 1.5rem;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }

    .intro {
      font-family: Arial, sans-serif;
      color: var(--muted);
      max-width: 600px;
      margin: 0 auto;
      line-height: 1.5;
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 1rem 3rem;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    input,
    select,
    button {
      font: inherit;
      padding: 0.8rem 0.9rem;
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    input,
    select {
      background: #fff;
    }

    button {
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      border: none;
    }

    button:hover {
      opacity: 0.92;
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
      font-family: Arial, sans-serif;
    }

    .saved-note {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .message {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 1.25rem;
      margin-bottom: 1rem;
      font-family: Arial, sans-serif;
      color: var(--muted);
    }

    .hidden {
      display: none;
    }

    .results {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1rem;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .cover {
      width: 100%;
      height: 290px;
      object-fit: cover;
      background: #e8dfd1;
    }

    .no-cover {
      width: 100%;
      height: 290px;
      display: grid;
      place-items: center;
      background: #e8dfd1;
      color: var(--muted);
      font-family: Arial, sans-serif;
    }

    .card-body {
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      flex: 1;
    }

    .book-title {
      font-size: 1.1rem;
      line-height: 1.4;
    }

    .book-meta {
      font-family: Arial, sans-serif;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .card-actions {
      margin-top: auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.75rem;
      font-family: Arial, sans-serif;
    }

    .save-btn {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 0.55rem 0.75rem;
    }

    .save-btn.saved {
      background: var(--accent);
      color: #fff;
    }

    .book-link {
      color: var(--accent);
      text-decoration: none;
      font-weight: bold;
    }

    @media (max-width: 700px) {
      .controls {
        grid-template-columns: 1fr;
      }

      .top-row {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>miBooks</h1>
    <p class="intro">Search for books using the Open Library API, filter the results, and save books you want to come back to later.</p>
  </header>

  <main>
    <div class="controls">
      <input id="searchInput" type="text" placeholder="Search by title or keyword">
      <select id="yearFilter">
        <option value="all">All years</option>
        <option value="before2000">Before 2000</option>
        <option value="after2000">2000 and later</option>
      </select>
      <button id="searchButton">Search</button>
    </div>

    <div class="top-row">
      <p id="resultsLabel" class="saved-note">Showing books for “harry potter”</p>
      <p id="savedCount" class="saved-note">Saved books: 0</p>
    </div>

    <div id="message" class="message">Loading books...</div>
    <section id="results" class="results"></section>
  </main>

  <script>
    const searchInput = document.getElementById('searchInput');
    const searchButton = document.getElementById('searchButton');
    const yearFilter = document.getElementById('yearFilter');
    const results = document.getElementById('results');
    const message = document.getElementById('message');
    const resultsLabel = document.getElementById('resultsLabel');
    const savedCount = document.getElementById('savedCount');

    let currentBooks = [];
    let savedBooks = JSON.parse(localStorage.getItem('savedBooks') || '[]');

    function updateSavedCount() {
      savedCount.textContent = `Saved books: ${savedBooks.length}`;
    }

    function isSaved(bookKey) {
      return savedBooks.some((book) => book.key === bookKey);
    }

    function saveBook(book) {
      if (isSaved(book.key)) {
        savedBooks = savedBooks.filter((savedBook) => savedBook.key !== book.key);
      } else {
        savedBooks.push(book);
      }

      localStorage.setItem('savedBooks', JSON.stringify(savedBooks));
      updateSavedCount();
      renderBooks();
    }

    function filteredBooks() {
      const filterValue = yearFilter.value;

      return currentBooks.filter((book) => {
        if (!book.first_publish_year) {
          return filterValue === 'all';
        }

        if (filterValue === 'before2000') {
          return book.first_publish_year < 2000;
        }

        if (filterValue === 'after2000') {
          return book.first_publish_year >= 2000;
        }

        return true;
      });
    }

    function createCover(book) {
      if (book.cover_i) {
        return `<img class="cover" src="https://covers.openlibrary.org/b/id/${book.cover_i}-M.jpg" alt="Cover for ${book.title}">`;
      }

      return '<div class="no-cover">No cover available</div>';
    }

    function renderBooks() {
      const booksToShow = filteredBooks();
      results.innerHTML = '';

      if (booksToShow.length === 0) {
        message.textContent = 'No books matched your search.';
        message.classList.remove('hidden');
        return;
      }

      message.classList.add('hidden');

      booksToShow.slice(0, 12).forEach((book) => {
        const card = document.createElement('article');
        const saved = isSaved(book.key);
        const author = book.author_name ? book.author_name[0] : 'Unknown author';
        const year = book.first_publish_year || 'No year listed';
        const subject = book.subject ? book.subject[0] : 'General';

        card.className = 'card';
        card.innerHTML = `
          ${createCover(book)}
          <div class="card-body">
            <h2 class="book-title">${book.title}</h2>
            <p class="book-meta">Author: ${author}</p>
            <p class="book-meta">First published: ${year}</p>
            <p class="book-meta">Subject: ${subject}</p>
            <div class="card-actions">
              <button class="save-btn ${saved ? 'saved' : ''}">${saved ? 'Saved' : 'Save'}</button>
              <a class="book-link" href="https://openlibrary.org${book.key}" target="_blank" rel="noreferrer">View book</a>
            </div>
          </div>
        `;

        card.querySelector('.save-btn').addEventListener('click', () => saveBook(book));
        results.appendChild(card);
      });
    }

    async function searchBooks(query) {
      if (!query) {
        message.textContent = 'Type something in the search box first.';
        message.classList.remove('hidden');
        results.innerHTML = '';
        return;
      }

      resultsLabel.textContent = `Showing books for “${query}”`;
      message.textContent = 'Loading books...';
      message.classList.remove('hidden');
      results.innerHTML = '';

      try {
        const response = await fetch(`https://openlibrary.org/search.json?q=${encodeURIComponent(query)}`);

        if (!response.ok) {
          throw new Error('Something went wrong while loading the books.');
        }

        const data = await response.json();
        currentBooks = data.docs || [];
        renderBooks();
      } catch (error) {
        message.textContent = 'There was a problem reaching the API. Please try again.';
        message.classList.remove('hidden');
      }
    }

    searchButton.addEventListener('click', () => {
      searchBooks(searchInput.value.trim());
    });

    searchInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        searchBooks(searchInput.value.trim());
      }
    });

    yearFilter.addEventListener('change', renderBooks);

    updateSavedCount();
    searchInput.value = 'harry potter';
    searchBooks('harry potter');
  </script>
</body>
</html>
